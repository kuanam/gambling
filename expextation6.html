<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>寶箱期望值</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --line: #e5e7eb;
  --text: #111827;
  --sub: #6b7280;
  --blue: #2563eb;
  --green-bg: #ecfdf5;
  --green-text: #047857;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: "Segoe UI", Arial, "Microsoft JhengHei", sans-serif;
  color: var(--text);
}

.app {
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

.title {
  font-size: 28px;
  font-weight: 800;
}

.desc {
  color: var(--sub);
  font-size: 14px;
  margin-top: 6px;
  margin-bottom: 18px;
}

.toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #eef2f7;
  font-weight: 700;
}

button:hover {
  background: #e5eaf1;
}

.card {
  background: white;
  border-radius: 18px;
  border: 1px solid var(--line);
  padding: 16px;
}

.section-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 12px;
}

.section-sub {
  color: var(--sub);
  font-size: 13px;
  margin-bottom: 14px;
}

.input-board {
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 16px;
  align-items: stretch;
  grid-auto-rows: 1fr;
}

.category-column {
  background: #f9fafb;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  height: 224px;
}

.category-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.category-body {
  overflow-y: auto;
  flex: 1;
  padding-right: 4px;
}

.price-row {
  display: grid;
  grid-template-columns: 1fr 80px;
}
.price-row:last-child {
  margin-bottom: 0;
}

.price-name {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.4;
}

.box-tag {
  display: inline-block;
  margin-left: 6px;
  padding: 2px 6px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  line-height: 1;
  vertical-align: middle;
  color: white;
}

.box-tag-ii {
  background: #16a34a; /* 綠 */
}

.box-tag-iii {
  background: #9333ea; /* 紫 */
}

.box-tag-iv {
  background: #f59e0b; /* 橘 */
}

.box-tag-v {
  background: #2563eb; /* 藍 */
}

.input-wrap {
  position: relative;
}

.input-wrap input {
  width: 100%;
  padding: 8px 26px 8px 8px;
  border-radius: 10px;
  border: 1px solid #d7deea;
  text-align: right;
  background: white;
}

.input-wrap input:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}

.unit {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--sub);
}

.gacha-block {
  grid-column: span 1;
}

.summary-section {
  margin-top: 22px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(220px, 1fr));
  gap: 12px;
}

.summary-card {
  padding: 18px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: white;
}

.summary-card.best {
  background: var(--green-bg);
  border-color: #b7ebc6;
}

.summary-title {
  font-size: 13px;
  color: var(--sub);
}

.summary-value {
  font-size: 32px;
  font-weight: 800;
  margin-top: 8px;
}

.summary-card.best .summary-value {
  color: var(--green-text);
}

.revenue-section {
  margin-top: 22px;
}

.revenue-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(220px, 1fr));
  gap: 12px;
}

.revenue-card {
  padding: 18px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: white;
}

.revenue-card.best {
  background: var(--green-bg);
  border-color: #b7ebc6;
}

.revenue-title {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.5;
}

.revenue-value {
  font-size: 28px;
  font-weight: 800;
  margin-top: 8px;
}

.revenue-card.best .revenue-value {
  color: var(--green-text);
}

.revenue-sub {
  font-size: 12px;
  color: var(--sub);
  margin-top: 6px;
}

/* 🎰 轉蛋券顏色 */
.gacha-gold {
  background: #fff7cc;
}

.gacha-1 {
  background: #e0f2fe;
}

.gacha-2 {
  background: #f3e8ff;
}

/* 💰 收益卡片顏色 */
.rev-gold {
  background: #fff7cc;
}

.rev-1 {
  background: #e0f2fe;
}

.rev-2 {
  background: #f3e8ff;
}

.gacha-container {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(3, minmax(260px, 1fr));
  gap: 20px;
  margin-top: 10px;
  align-items: stretch;
}

.gacha-block {
  width: 100%;
  height: 180px;
}

@media (max-width: 1200px) {
  .gacha-container {
    grid-template-columns: repeat(2, minmax(240px, 1fr));
  }
}

@media (max-width: 760px) {
  .gacha-container {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

  "1週年紀念黃金轉蛋券",
  "1週年紀念卷軸轉蛋券Ⅰ",
  "1週年紀念卷軸轉蛋券Ⅱ"
];

const rawItems = [...new Set([
  ...boxes.flatMap(b => b.items.map(i => i[0])),
  ...extraItems
])];

const categories = [
  { name: "眼部裝飾", keyword: "眼部裝飾" },
  { name: "臉部裝飾", keyword: "臉部裝飾" },
  { name: "腰帶", keyword: "腰帶" },

  { name: "上衣", keyword: "上衣" },
  { name: "下衣", keyword: "下衣" },
  { name: "頭盔", keyword: "頭盔" },
  { name: "耳環", keyword: "耳環" },
  { name: "套服", keyword: "套服" },
  { name: "披風", keyword: "披風" },
  { name: "鞋子", keyword: "鞋子" },
  { name: "魔力", keyword: "魔力" },
  { name: "攻擊力", keyword: "攻擊力" },
  { name: "轉蛋券", keyword: "__gacha__" }
];

const boxWeights = {
  "1週年達成寶箱 II": 1.2,
  "1週年達成寶箱 III": 0.6,
  "1週年達成寶箱 IV": 0.4,
  "1週年達成寶箱 V": 0.24
};

function getCategory(name) {
  if (name.includes("轉蛋券")) return "轉蛋券";

  for (const cat of categories) {
    if (name.includes(cat.keyword)) return cat.name;
  }
  return "其餘";
}

const groupedItems = {};
rawItems.forEach(item => {
  const cat = getCategory(item);
  if (!groupedItems[cat]) groupedItems[cat] = [];
  groupedItems[cat].push(item);
});

Object.keys(groupedItems).forEach(cat => {
  groupedItems[cat].sort((a, b) => a.localeCompare(b, "zh-Hant"));
});

function buildInputs() {
  const el = document.getElementById("priceList");
  el.innerHTML = "";
  let gachaHTML = "";

  categories.forEach(cat => {
    if (cat.name === "轉蛋券") return;
    if (!groupedItems[cat.name]) return;

    let block = `
      <div class="category-column">
        <div class="category-title">${cat.name}</div>
        <div class="category-body">
    `;

    groupedItems[cat.name].forEach(name => {
      block += `
        <div class="price-row">
          <div class="price-name">
                <span class="price-text">${name}</span>
                ${getItemTags(name)}
            </div>
          <div class="input-wrap">
            <input id="${name}" oninput="calc()" />
            <span class="unit">萬</span>
          </div>
        </div>
      `;
    });

    block += `
        </div>
      </div>
    `;

    el.innerHTML += block;
  });

    let block = `
      <div class="category-column">
        <div class="category-title">其餘</div>
        <div class="category-body">
    `;

    groupedItems["其餘"].forEach(name => {
      block += `
        <div class="price-row">
          <div class="price-name">
            <span class="price-text">${name}</span>
            ${getItemTags(name)}
        </div>
          <div class="input-wrap">
            <input id="${name}" oninput="calc()" />
            <span class="unit">萬</span>
          </div>
        </div>
      `;

    block += `
        </div>
      </div>
    `;

    el.innerHTML += block;
  }

    if (groupedItems["轉蛋券"]) {

        if (name.includes("黃金")) colorClass = "gacha-gold";
        else if (name.includes("Ⅰ")) colorClass = "gacha-1";
        else if (name.includes("Ⅱ")) colorClass = "gacha-2";

        let block = `
        <div class="category-column gacha-block ${colorClass}">
            <div class="category-title">${name}</div>
            <div class="category-body">

            <div class="price-row">
                <div class="price-name">價格</div>
                <div class="input-wrap">
                <input id="${name}" oninput="calc()" />
                <span class="unit">萬</span>
                </div>
            </div>

        </div>
        `;

}

function getPrice(name) {
  const el = document.getElementById(name);
  if (!el) return 0;
  const v = el.value.replace(/,/g, "");
  return parseFloat(v) || 0;
}

function calc() {
  const boxResults = [];

  boxes.forEach(box => {
    let total = 0;
    box.items.forEach(([name, p]) => {
      total += getPrice(name) * (p / 100);
    });
    boxResults.push({ key: box.key, val: total });
  });

  render(boxResults);
  renderRevenue(boxResults);
}

function render(data) {
  const el = document.getElementById("summary");
  el.innerHTML = "";

  let best = data.reduce((a, b) => a.val > b.val ? a : b);

  data.forEach(d => {
    el.innerHTML += `

        <div class="summary-card">
        <div class="summary-title">${d.key}</div>
        <div class="summary-value">${d.val.toFixed(2)} <span style="font-size:16px;color:#6b7280;">萬</span></div>
      </div>
    `;
  });
}

function renderRevenue(boxResults) {
  const el = document.getElementById("revenueGrid");
  el.innerHTML = "";

  const gachaItems = groupedItems["轉蛋券"] || [];
  const revenueResults = [];

  gachaItems.forEach(ticketName => {
    const ticketPrice = getPrice(ticketName);

    boxResults.forEach(box => {
      const weight = boxWeights[box.key] || 1;
      const revenue = ticketPrice * 50 + box.val * weight;

      revenueResults.push({
        ticketName,
        boxKey: box.key,
        value: revenue,
        weight
      });
    });
  });

  if (!revenueResults.length) return;

  const best = revenueResults.reduce((a, b) => a.value > b.value ? a : b);

    revenueResults.forEach(item => {

    let colorClass = "";
    if (item.ticketName.includes("黃金")) colorClass = "rev-gold";
    else if (item.ticketName.includes("Ⅰ")) colorClass = "rev-1";
    else if (item.ticketName.includes("Ⅱ")) colorClass = "rev-2";

    el.innerHTML += `
        <div class="revenue-card ${colorClass}">
        <div class="revenue-title">${item.ticketName}<br>${item.boxKey}</div>
        <div class="revenue-value">
            ${item.value.toFixed(2)} 
            <span style="font-size:16px;color:#6b7280;">萬</span>
        </div>
        <div class="revenue-sub">權重 ${item.weight}</div>
        </div>
    `;
    });
}

function clearAll() {
  rawItems.forEach(n => {
    const input = document.getElementById(n);
    if (input) input.value = "";
  });
  calc();
}

function getItemTags(name) {
  const tags = [];

  boxes.forEach(box => {
    const exists = box.items.some(item => item[0] === name);

    if (exists) {
      if (box.key.includes("V")) {
        tags.push('<span class="box-tag box-tag-v">V</span>');
      }
    }
  });

  return tags.join("");
}

function getItemTags(name) {
  const tags = [];

  boxes.forEach(box => {
    const exists = box.items.some(item => item[0] === name);
    if (!exists) return;

    if (box.key.includes("II") && !box.key.includes("III") && !box.key.includes("IV") && !box.key.includes("V")) {
      tags.push('<span class="box-tag box-tag-ii">II</span>');
    } else if (box.key.includes("III")) {
      tags.push('<span class="box-tag box-tag-iii">III</span>');
    } else if (box.key.includes("IV")) {
      tags.push('<span class="box-tag box-tag-iv">IV</span>');
    } else if (box.key.includes("V")) {
      tags.push('<span class="box-tag box-tag-v">V</span>');
    }
  });

  return tags.join("");
}

buildInputs();
calc();
</script>
